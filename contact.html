<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-center mb-10">Contact Me</h1>

    <!-- Contact Card -->
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 mb-10">
      <h2 class="text-2xl font-semibold mb-4">My Contact Details</h2>
      <p><strong>Name:</strong> John Doe</p>
      <p><strong>Address:</strong> 123 Main Street, City, Country</p>
      <p><strong>Email:</strong> john.doe@example.com</p>
    </div>

    <!-- Social Media Links -->
    <div class="text-center mb-10">
      <h2 class="text-xl font-semibold mb-4">Follow Me</h2>
      <div class="flex justify-center space-x-6">
        <a href="#" class="text-blue-500 hover:text-blue-700">Twitter</a>
        <a href="#" class="text-blue-700 hover:text-blue-900">Facebook</a>
        <a href="#" class="text-pink-600 hover:text-pink-800">Instagram</a>
        <a href="#" class="text-gray-800 hover:text-black">LinkedIn</a>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-lg p-6">
      <h2 class="text-2xl font-semibold mb-4">Send Me a Message</h2>
      <form action="mailto:john.doe@example.com" method="POST" enctype="text/plain">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Name</label>
          <input type="text" name="name" class="w-full border rounded-lg px-3 py-2" required />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" name="email" class="w-full border rounded-lg px-3 py-2" required />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Message</label>
          <textarea name="message" rows="4" class="w-full border rounded-lg px-3 py-2" required></textarea>
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Send Message</button>
      </form>
    </div>
  </div>
</body>
</html>
